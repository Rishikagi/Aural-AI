version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: interview-prep-db
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: interview-prep

  backend:
    build: ./backend
    container_name: interview-prep-api
    ports:
      - "5000:5000"
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/interview-prep
      - JWT_SECRET=${JWT_SECRET:-change_this_secret}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - PORT=5000
      - NODE_ENV=production
      - FRONTEND_URL=http://localhost:3000
    depends_on:
      - mongodb
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: interview-prep-web
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  mongo_data:
